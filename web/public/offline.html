<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relay — Offline</title>
    <meta name="theme-color" content="#6366f1" />
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f8fafc; color: #222; text-align: center; padding: 2rem;
      }
      .card { max-width: 22rem; }
      h1 { color: #6366f1; font-size: 1.5rem; margin: 0 0 .5rem; }
      button {
        margin-top: 1.25rem; padding: .6rem 1.2rem; border: 0; border-radius: 999px;
        background: #6366f1; color: #fff; font-size: 1rem; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>Relay can't reach the network right now. Reconnect and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
