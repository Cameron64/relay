<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Relay</title>

    <!-- PWA / installability -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#6366f1" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Relay" />

    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand"><span class="dot"></span> Relay</div>
      <div class="actions">
        <button id="notify-toggle" class="ghost" disabled>Enable notifications</button>
        <span id="notify-status" class="muted"></span>
        <button id="lock-btn" class="ghost hidden" title="Forget this device">Lock</button>
      </div>
    </header>

    <main id="app">
      <section id="unlock" class="unlock hidden">
        <form id="unlock-form" class="unlock-card">
          <h1>Unlock Relay</h1>
          <p class="muted">Paste your UI token to read cards on this device. It's stored as a secure cookie, not in the page.</p>
          <input id="unlock-token" type="password" autocomplete="off" inputmode="text" placeholder="UI token" />
          <button type="submit" class="primary">Unlock</button>
          <small id="unlock-error" class="error"></small>
        </form>
      </section>

      <section id="feed" class="feed" aria-live="polite"></section>
      <p id="empty" class="empty hidden">No cards yet. When Claude Code sends something, it shows up here.</p>
    </main>

    <div id="toast" class="toast hidden" role="status"></div>

    <!-- Vendored (offline-capable, SW-cacheable). Mermaid is lazy-loaded by app.js only
         when a diagram card appears — it's big and not in the precache list. -->
    <script src="/vendor/marked.min.js"></script>
    <script src="/vendor/purify.min.js"></script>
    <script src="/push-client.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
